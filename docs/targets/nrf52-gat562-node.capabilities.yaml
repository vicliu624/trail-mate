target: "nrf52-gat562-node"
status: "draft"

product:
  family: "trail-mate"
  form_factor: "embedded_node"
  interaction_class: "headless_status"

platform:
  kind: "nrf52"
  sdk: "arduino_nrf52"
  memory_tier: "tiny"
  filesystem: "internal_flash"
  dynamic_allocation: "limited"

board:
  id: "gat562"
  package: "boards/gat562_mesh_evb_pro"

runtime:
  scheduler: "freertos"
  ui_thread: "none"
  radio_thread: "radio_task"
  gps_thread: "gps_task"
  ble_thread: "stack_callback"
  isr_policy: "defer_to_queue"
  lock_policy: "message_passing"

ui:
  shell: "headless"
  renderer: "none"
  presentation_model_host: "none"
  layout_profile: "none"
  input_model: "buttons_joystick_status_only"

execution:
  app_host: "nrf52"
  mesh_core_host: "nrf52"
  gps_core_host: "nrf52"
  phone_core_host: "nrf52"
  hostlink_core_host: "none"
  ui_host: "none"

authorities:
  identity: "nrf52"
  peer_key_store: "nrf52"
  node_store: "nrf52"
  message_store: "nrf52"
  location: "nrf52"
  time: "nrf52"
  config: "nrf52"
  device_status: "nrf52"
  ui_state: "none"

capabilities:
  lora:
    state: "ready"
    endpoint_host: "nrf52"
    mode: "local_radio"
  gps:
    state: "ready"
    endpoint_host: "nrf52"
    mode: "local_uart"
  ble:
    state: "ready"
    endpoint_host: "nrf52"
    stack: "bluefruit"
    roles:
      meshtastic_phone: "server"
      meshcore_phone: "server"
      trailmate_control: "disabled"
  storage:
    state: "ready"
    endpoint_host: "nrf52"
  display:
    state: "present"
    endpoint_host: "nrf52"
  input:
    state: "present"
    endpoint_host: "nrf52"
  battery:
    state: "present"
    endpoint_host: "nrf52"

capability_bindings:
  lora:
    board_provider: "gat562.radio"
    platform_driver: "nrf52_sx1262_packet_radio"
    runtime_owner: "radio_task"
    protocol_consumers: ["core_mesh.meshtastic", "core_mesh.meshcore"]
  gps:
    board_provider: "gat562.gps"
    platform_driver: "nrf52_uart_gnss"
    runtime_owner: "gps_task"
    protocol_consumers: ["core_gps.nmea", "core_gps.location_service", "core_gps.time_authority"]
  ble:
    board_provider: "nrf52.integrated_ble"
    platform_driver: "bluefruit_gatt_host"
    runtime_owner: "stack_callback"
    protocol_consumers: ["core_phone.meshtastic", "core_phone.meshcore"]

protocols:
  meshtastic:
    enabled: true
    radio_profile_source: "core_mesh"
    ble_phone_core: "core_phone"
  meshcore:
    enabled: true
    radio_profile_source: "core_mesh"
    ble_phone_core: "core_phone"
  hostlink:
    enabled: false
    frame_core: "disabled"

storage:
  backend: "nrf52_flash"
  identity: "nrf52_flash"
  peer_keys: "nrf52_flash"
  config: "nrf52_flash"
  messages: "nrf52_flash_or_disabled"
  node_store: "nrf52_flash"

race_policy:
  app_to_ui: "snapshot"
  radio_to_app: "event_queue"
  gps_to_app: "event_queue"
  ble_to_app: "command_queue"
  isr_to_driver: "defer_only"
  store_access: "single_owner_or_mutex"
  ui_update: "none"

build:
  app: "legacy/app_implementations/gat562_mesh_evb_pro"
  board_package: "boards/gat562_mesh_evb_pro"
  platformio_envs: ["gat562_mesh_evb_pro"]
  enabled_modules: ["core_chat", "core_device", "core_gps", "core_hostlink", "core_phone", "core_mesh", "ui_presentation", "core_sys", "core_team", "ui_shared"]
  disabled_modules: []

