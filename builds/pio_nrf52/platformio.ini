; Build Entrypoint invokes; App Shell composes.
;
; Phase 8 convergence baseline.
; Historical PIO roots, recorded by apps/nrf52_node historical descriptor:
; - removed root esp_pio
; - removed root gat562_mesh_evb_pro
;
; Final app shell semantic root:
; - apps/nrf52_node
;
; This file establishes the authoritative nRF52 PlatformIO wrapper location.
; The existing root/platform app environments remain transitional until the
; wrapper can delegate to them without changing flash/build behavior.

[platformio]
description = Trail Mate nRF52 build wrapper baseline
boards_dir = ../../boards

[env]
extra_scripts =
    pre:../../scripts/platformio-pre.py
    post:../../scripts/platformio-post.py

[env:nrf52_node_wrapper_baseline]
platform = nordicnrf52
framework = arduino
board = adafruit_feather_nrf52840
lib_deps =
    symlink://../../apps/nrf52_node
    symlink://../../modules/product_composition
    symlink://../../modules/ui_presentation
    symlink://../../modules/ui_lvgl_ux_packs
build_flags =
    -DTRAIL_MATE_BUILD_WRAPPER_BASELINE=1
    -DLV_CONF_SKIP=1
    -I../../modules/ui_presentation/include
    -I../../modules/product_composition/include
    -I../../modules/ui_lvgl_ux_packs/include
build_src_filter =
    +<nrf52_node_wrapper_baseline.cpp>

[env:gat562_mesh_evb_pro]
platform = nordicnrf52
framework = arduino
board = gat562_mesh_evb_pro
board_build.variants_dir = ../../variants
monitor_speed = 115200
lib_archive = false
lib_deps =
    symlink://../../apps/nrf52_node
    symlink://../../modules/product_composition
    symlink://../../modules/ui_presentation
    symlink://../../modules/ui_lvgl_ux_packs
    symlink://../../modules/core_chat
    symlink://../../modules/core_mesh
    symlink://../../modules/core_phone
    symlink://../../modules/core_sys
    symlink://../../modules/core_gps
    symlink://../../modules/ui_mono_128x64
    symlink://../../modules/chat_presentation_adapters
    symlink://../../boards/gat562_mesh_evb_pro
    symlink://../../platform/nrf52
    symlink://../../platform/nrf52/arduino_common
    jgromes/RadioLib @ 7.4.0
    mikalhart/TinyGPSPlus @ 1.0.3
    rweather/Crypto @ 0.4.0
    adafruit/Adafruit GFX Library @ ^1.12.0
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit BusIO @ ^1.17.0
    Adafruit Bluefruit nRF52 Libraries
    Adafruit nRFCrypto
build_flags =
    -std=gnu++17
    -DTRAILMATE_TARGET_GAT562_MESH_EVB_PRO=1
    -DTRAILMATE_TARGET_ID=\"gat562_mesh_evb_pro\"
    -DARDUINO_NRF52840_FEATHER
    -DNRF52840_XXAA
    -DS140
    -DGAT562_MESH_EVB_PRO
    -DTRAIL_MATE_LORA_TX_POWER_MAX_DBM=30
    -DGAT562_NO_TEAM=1
    -DGAT562_NO_HOSTLINK=1
    -DGAT562_NO_SD=1
    -DGAT562_NO_CJK=1
    -DGAT562_NO_PINYIN_IME=1
    -DTRAIL_MATE_NRF_MONO_FUSION_PIXEL_8_ENABLED=1
    -DTRAIL_MATE_NRF_MONO_FUSION_PIXEL_10_ENABLED=0
    -DCONFIG_NFCT_PINS_AS_GPIOS=1
    -DUI_SHARED_TOUCH_IME_ENABLED=0
    -DLV_CONF_SKIP=1
    -DSCREEN_WIDTH=128
    -DSCREEN_HEIGHT=64
    -DRADIOLIB_EXCLUDE_RF69
    -DRADIOLIB_EXCLUDE_SX1231
    -DRADIOLIB_EXCLUDE_RFM2X
    -DRADIOLIB_EXCLUDE_CC1101
    -DRADIOLIB_EXCLUDE_NRF24
    -DRADIOLIB_EXCLUDE_SI443X
    -DRADIOLIB_EXCLUDE_LR11X0
    -DRADIOLIB_EXCLUDE_SX127X
    -DRADIOLIB_EXCLUDE_SX128X
    -DRADIOLIB_EXCLUDE_AFSK
    -DRADIOLIB_EXCLUDE_AX25
    -DRADIOLIB_EXCLUDE_HELLSCHREIBER
    -DRADIOLIB_EXCLUDE_MORSE
    -DRADIOLIB_EXCLUDE_RTTY
    -DRADIOLIB_EXCLUDE_SSTV
    -DRADIOLIB_EXCLUDE_DIRECT_RECEIVE
    -DRADIOLIB_EXCLUDE_APRS
    -DRADIOLIB_EXCLUDE_BELL
    -DRADIOLIB_EXCLUDE_LORAWAN
    -DRADIOLIB_EXCLUDE_FSK4
    -DRADIOLIB_EXCLUDE_PAGER
    -I../../apps/nrf52_node/src
    -I../../modules/product_composition/include
    -I../../modules/ui_presentation/include
    -I../../modules/ui_lvgl_ux_packs/include
    -I../../modules/core_chat/include
    -I../../modules/core_chat/generated
    -I../../modules/core_chat/third_party/nanopb
    -I../../modules/core_gps/include
    -I../../modules/core_mesh/include
    -I../../modules/core_phone/include
    -I../../modules/core_sys/include
    -I../../modules/ui_mono_128x64/include
    -I../../modules/ui_shared/include
    -I../../modules/chat_presentation_adapters/include
    -I../../platform/shared/include
    -I../../platform/nrf52
    -I../../platform/nrf52/arduino_common/include
    -I../../boards/gat562_mesh_evb_pro/include
    -I../../variants/gat562_mesh_evb_pro
build_src_filter =
    +<gat562_mesh_evb_pro.cpp>
lib_ignore =
    core_team
    core_hostlink
