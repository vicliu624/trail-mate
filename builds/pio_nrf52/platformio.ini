; Build Entrypoint invokes; App Shell composes.
;
; Phase 8 convergence baseline.
; Current transitional PIO roots:
; - apps/esp_pio
; - apps/gat562_mesh_evb_pro
;
; Final app shell semantic root:
; - apps/nrf52_node
;
; This file establishes the authoritative nRF52 PlatformIO wrapper location.
; The existing root/platform app environments remain transitional until the
; wrapper can delegate to them without changing flash/build behavior.

[platformio]
description = Trail Mate nRF52 build wrapper baseline

[env:nrf52_node_wrapper_baseline]
platform = nordicnrf52
framework = arduino
board = adafruit_feather_nrf52840
lib_deps =
    symlink://../../apps/nrf52_node
build_flags =
    -DTRAIL_MATE_BUILD_WRAPPER_BASELINE=1
    -I../../apps/esp_pio/src
build_src_filter =
    +<nrf52_node_wrapper_baseline.cpp>
