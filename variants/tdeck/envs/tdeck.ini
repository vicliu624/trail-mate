[env:tdeck]
extends = arduino_base
board = T-Deck
upload_speed = 921600
build_src_filter =
    +<*>
    -<board/LilyGoKeyboard.cpp>
build_flags =
    ${arduino_base.build_flags}
    -DBOARD_HAS_PSRAM=1
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=185
    -DARDUINO_T_DECK
    -DARDUINO_LILYGO_LORA_SX1262
    -DTRAIL_MATE_LORA_TX_POWER_MAX_DBM=22
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISPLAY_DRIVER_ST7789
    -DSCREEN_WIDTH=320
    -DSCREEN_HEIGHT=240
    -DUSING_INPUT_DEV_TOUCHPAD
    -DUSING_INPUT_DEV_KEYBOARD
    -DTRAIL_MATE_ENABLE_SSTV=0
    -I variants/tdeck
lib_deps =
    ${arduino_base.lib_deps}

[env:tdeck_debug]
extends = arduino_base
board = T-Deck
upload_speed = 921600
build_src_filter =
    +<*>
    -<board/LilyGoKeyboard.cpp>
build_flags =
    ${arduino_base.build_flags}
    -DBOARD_HAS_PSRAM=1
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=185
    -DARDUINO_T_DECK
    -DARDUINO_LILYGO_LORA_SX1262
    -DTRAIL_MATE_LORA_TX_POWER_MAX_DBM=22
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISPLAY_DRIVER_ST7789
    -DSCREEN_WIDTH=320
    -DSCREEN_HEIGHT=240
    -DUSING_INPUT_DEV_TOUCHPAD
    -DUSING_INPUT_DEV_KEYBOARD
    -DTRAIL_MATE_ENABLE_SSTV=0
    -D MESHCORE_LOG_ENABLE=1
    -D LORA_LOG_ENABLE=1
    -D APP_EVENT_LOG_ENABLE=1
    -I variants/tdeck
lib_deps =
    ${arduino_base.lib_deps}
