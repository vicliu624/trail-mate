[env:tdeck_pro_a7682e]
extends = arduino_base
board = T-Deck-Pro
upload_speed = 921600
build_flags =
    ${arduino_base.build_flags}
    -DBOARD_HAS_PSRAM=1
    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=185
    -DARDUINO_T_DECK_PRO
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_LILYGO_LORA_SX1262
    -DTRAIL_MATE_LORA_TX_POWER_MAX_DBM=22
    -DSCREEN_WIDTH=240
    -DSCREEN_HEIGHT=320
    -DSENSOR_INT=21
    -DGPS_TX=43
    -DGPS_RX=44
    -DLORA_CS=3
    -DLORA_BUSY=6
    -DLORA_RST=4
    -DLORA_IRQ=5
    -DSD_CS=48
    -DDISP_CS=34
    -DDISP_DC=35
    -DDISP_RST=-1
    -DDISP_BUSY=37
    -DBOARD_TOUCH_INT=12
    -DUSING_INPUT_DEV_TOUCHPAD
    -DUSING_INPUT_DEV_KEYBOARD
    -DTRAIL_MATE_TDECK_PRO=1
    -DTRAIL_MATE_TDECK_PRO_A7682E=1
lib_deps =
    ${arduino_base.lib_deps}
    zinggjm/GxEPD2 @ 1.5.9
    adafruit/Adafruit TCA8418 @ ^1.0.2
    adafruit/Adafruit BusIO @ ^1.17.0
    mikalhart/TinyGPSPlus @ 1.0.3

