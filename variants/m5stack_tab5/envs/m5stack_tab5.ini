; M5Stack Tab5 (ESP32-P4) environment
; Uses pioarduino platform-espressif32 fork (develop branch) for ESP32-P4 support.

[env:m5stack_tab5]
extends = idf_base

; Custom board definition lives in boards/m5stack-tab5.json
board = m5stack-tab5

upload_speed = 115200

build_src_filter =
    +<*>
    -<board/TLoRaPagerBoard.cpp>
    -<board/TDeckBoard.cpp>
    -<board/TWatchS3Board.cpp>
    +<board/M5Tab5Board.cpp>

build_flags =
    ${idf_base.build_flags}
    -DBOARD_HAS_PSRAM=1
    -DARDUINO_M5STACK_TAB5
    -DDISPLAY_DRIVER_ST7703        ; Tab5 uses MIPI DSI + ST7703/ILI9881C family
    -DSCREEN_WIDTH=1280
    -DSCREEN_HEIGHT=720
    -DUSING_INPUT_DEV_TOUCHPAD
    -I variants/m5stack_tab5

lib_deps =
    ${idf_base.lib_deps}

