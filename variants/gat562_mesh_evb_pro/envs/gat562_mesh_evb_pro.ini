[env:gat562_mesh_evb_pro]
extends = env
framework = arduino
platform = nordicnrf52
board = gat562_mesh_evb_pro
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -DARDUINO_NRF52840_FEATHER
    -DNRF52840_XXAA
    -DS140
    -DGAT562_MESH_EVB_PRO
    -DGAT562_NO_TEAM=1
    -DGAT562_NO_HOSTLINK=1
    -DGAT562_NO_SD=1
    -DGAT562_NO_CJK=1
    -DGAT562_NO_PINYIN_IME=1
    -DTRAIL_MATE_NRF_MONO_FUSION_PIXEL_8_ENABLED=1
    -DTRAIL_MATE_NRF_MONO_FUSION_PIXEL_10_ENABLED=0
    -DCONFIG_NFCT_PINS_AS_GPIOS=1
    -DUI_SHARED_TOUCH_IME_ENABLED=0
    -DSCREEN_WIDTH=128
    -DSCREEN_HEIGHT=64
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/boards/gat562_mesh_evb_pro/include
    -I${PROJECT_DIR}/platform/nrf52/arduino_common/include
    -I${PROJECT_DIR}/platform/esp/boards/include
    -I${PROJECT_DIR}/variants/gat562_mesh_evb_pro
    -I${PROJECT_DIR}/modules/core_sys/include
    -I${PROJECT_DIR}/modules/core_chat/include
    -I${PROJECT_DIR}/modules/core_chat/generated
    -I${PROJECT_DIR}/modules/core_chat/third_party/nanopb
    -I${PROJECT_DIR}/modules/core_gps/include
    -I${PROJECT_DIR}/modules/ui_mono_128x64/include
    -I${PROJECT_DIR}/modules/ui_shared/include
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/SPI
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Wire
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Bluefruit52Lib/src
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Bluefruit52Lib/src/services
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_nRFCrypto/src
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_LittleFS/src
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/InternalFileSytem/src
build_src_filter =
    +<*>
    -<modules/core_team/*>
    -<modules/core_hostlink/*>
    -<modules/ui_shared/src/*>
    -<platform/esp/*>
lib_extra_dirs =
    ${PROJECT_DIR}/modules
    ${PROJECT_DIR}/apps
    ${PROJECT_DIR}/boards
    ${PROJECT_DIR}/platform/nrf52
    ${PROJECT_DIR}/third_party
    ${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries
lib_deps =
    jgromes/RadioLib @ 7.4.0
    mikalhart/TinyGPSPlus @ 1.0.3
    nanopb/nanopb @ ^0.4.8
    rweather/Crypto @ 0.4.0
    adafruit/Adafruit GFX Library @ ^1.12.0
    adafruit/Adafruit SSD1306 @ ^2.5.13
    Adafruit Bluefruit nRF52 Libraries
    Adafruit TinyUSB Library
    Adafruit nRFCrypto
lib_ignore =
    apps_esp_pio
    core_team
    core_hostlink
